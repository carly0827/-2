<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>강의록 자동 필기기</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <main class="wrap">
    <section class="card hero">
      <h1>강의록 자동 필기기</h1>
      <p class="lead">아이패드 Safari에서 바로 쓰는 빠른 버전</p>
      <ul class="simple-list">
        <li>강의록 PDF 업로드</li>
        <li>전사본 파일 업로드 (json / srt / txt)</li>
        <li>결과 PDF 다운로드</li>
      </ul>
    </section>

    <section class="card">
      <form action="/process" method="post" enctype="multipart/form-data" class="form">
        <label class="field">
          <span>강의록 PDF</span>
          <input type="file" name="pdf" accept=".pdf,application/pdf" required>
        </label>

        <label class="field">
          <span>전사본 파일</span>
          <input type="file" name="transcript" accept=".json,.srt,.txt,text/plain,application/json" required>
        </label>

        <button type="submit" class="button">필기 PDF 만들기</button>
      </form>
    </section>

    <section class="card small">
      <h2>자동으로 되는 것</h2>
      <p>형광펜, 본문 옆 메모, 그림 설명 박스, 오른쪽 원문, 아래 전체 정리, 연습문제/기출문제 페이지 자동 건너뛰기.</p>
    </section>
  </main>
</body>
</html>
